spring:
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

  datasource:
    url: jdbc:postgresql://localhost:5432/ironpasture_dev
    username: ironpasture
    password: ironpasture

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1:8b
          temperature: 0.1
      embedding:
        options:
          model: nomic-embed-text
