spring:
  application:
    name: iron-pasture

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    job:
      enabled: false

  ai:
    vectorstore:
      pgvector:
        index-type: hnsw
        distance-type: cosine_distance
        dimensions: 768
        initialize-schema: true

  security:
    user:
      name: disabled

# Default dev users (in-memory, {noop} passwords)
app:
  security:
    users:
      - username: plant-manager
        password: "{noop}plant-manager"
        roles: PLANT_MANAGER
      - username: inspector
        password: "{noop}inspector"
        roles: INSPECTOR

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
